<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X1 Beach Lounge | Agenda</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo_ranking_x1_oficial.png') }}">
  <link rel="shortcut icon" href="{{ url_for('static', filename='images/logo_ranking_x1_oficial.png') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body data-page="agenda">
  <header class="topbar">
    <div class="topbar-grid">
      <div class="topbar-logo left">
        <img class="brand-logo" src="{{ url_for('static', filename='images/images.png') }}" alt="Logo Arena Beach Lounge">
      </div>
      <div class="topbar-title">
        <span class="topbar-club">X1 Beach Lounge</span>
        <h1>Agenda de Quadras</h1>
        <p>Visual semanal por horário e quadra</p>
      </div>
      <div class="topbar-logo right">
        <img class="brand-logo" src="{{ url_for('static', filename='images/logo_ranking_x1_oficial.png') }}" alt="Logo Ranking X1">
      </div>
    </div>
  </header>
  <nav class="nav-links">
    <a href="/">Início</a><a href="/ranking">Ranking</a><a href="/partidas">Jogos marcados</a><a href="/resultado-atleta">Resultado do atleta</a><a href="/regulamento">Regulamento</a><a href="/secretaria">Secretaria</a>
  </nav>

  <main class="container">
    <section class="panel filtros-grid">
      <label>Data
        <input type="date" id="agendaData">
      </label>
      <button id="btnAtualizarAgenda">Atualizar agenda</button>
    </section>

    <section class="panel">
      <h2>Grade de ocupação</h2>
      <div class="table-wrap">
        <table class="table agenda-matrix" id="agendaTable">
          <thead>
            <tr>
              <th>Horário</th>
              {% for quadra in quadras %}<th>{{ quadra.nome }}</th>{% endfor %}
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <p class="hint">Verde = livre | Azul = jogo marcado | Vermelho = conflito</p>
    </section>
  </main>
  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
