<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X1 Beach Lounge | Ranking</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo_ranking_x1_oficial.png') }}">
  <link rel="shortcut icon" href="{{ url_for('static', filename='images/logo_ranking_x1_oficial.png') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body data-page="ranking">
  <header class="topbar">
    <div class="topbar-grid">
      <div class="topbar-logo left">
        <img class="brand-logo" src="{{ url_for('static', filename='images/images.png') }}" alt="Logo Arena Beach Lounge">
      </div>
      <div class="topbar-title">
        <span class="topbar-club">X1 Beach Lounge</span>
        <h1>Ranking</h1>
        <p>Classificação oficial por categoria</p>
      </div>
      <div class="topbar-logo right">
        <img class="brand-logo" src="{{ url_for('static', filename='images/logo_ranking_x1_oficial.png') }}" alt="Logo Ranking X1">
      </div>
    </div>
  </header>
  <nav class="nav-links">
    <a href="/">Início</a><a href="/agenda">Agenda</a><a href="/partidas">Jogos marcados</a><a href="/resultado-atleta">Resultado do atleta</a><a href="/desafio">Desafios</a><a href="/regulamento">Regulamento</a><a href="/secretaria">Secretaria</a>
  </nav>
  <main class="container">
    <section class="panel">
      <label>Categoria
        <select id="filtroRanking">
          {% for k,v in ranking_rotulos.items() %}
            <option value="{{ k }}">{{ v }}</option>
          {% endfor %}
        </select>
      </label>
    </section>
    <section class="panel">
      <div class="panel-actions">
        <div>
          <h2>Lista atualizada do ranking</h2>
          <p class="hint">Copie ou envie o texto pronto para o grupo sempre que houver mudança de posição.</p>
        </div>
        <div class="ranking-share-actions">
          <button id="btnCopiarRanking" type="button" class="btn-secundario">Copiar lista</button>
          <button id="btnWhatsappRanking" type="button" class="btn-secundario btn-whatsapp">WhatsApp</button>
        </div>
      </div>
      <p id="msgRankingShare" class="msg"></p>
      <table class="table" id="rankingTable">
        <thead><tr><th>Posição</th><th>Nome</th><th>Classe</th><th>Status</th></tr></thead>
        <tbody></tbody>
      </table>
    </section>
  </main>
  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
