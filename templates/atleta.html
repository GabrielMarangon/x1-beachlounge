<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X1_BTC - Atleta</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body data-page="atleta" data-atleta-id="{{ atleta_id }}">
  <header class="topbar">
    <div class="topbar-grid">
      <div class="topbar-logo left">
        <img class="brand-logo" src="{{ url_for('static', filename='images/logo_btc_oficial.png') }}" alt="Logo Brasil Tênis Clube">
      </div>
      <div class="topbar-title">
        <span class="topbar-club">Brasil Tênis Clube</span>
        <h1>Perfil do Atleta</h1>
        <p>Posição, status, desafios e histórico</p>
      </div>
      <div class="topbar-logo right">
        <img class="brand-logo" src="{{ url_for('static', filename='images/logo_ranking_x1_oficial.png') }}" alt="Logo Ranking X1">
      </div>
    </div>
  </header>
  <nav class="nav-links">
    <a href="/">Início</a><a href="/ranking">Ranking</a><a href="/desafio">Desafios</a><a href="/partidas">Jogos marcados</a><a href="/resultado-atleta">Resultado do atleta</a><a href="/regulamento">Regulamento</a>
  </nav>

  <main class="container">
    <section class="panel" id="atletaResumo"></section>

    <section class="panel-grid">
      <section class="panel">
        <h2>Desafios possíveis</h2>
        <ul id="desafiosPossiveis" class="list-clean"></ul>
      </section>

      <section class="panel">
        <h2>Pode ser desafiado por</h2>
        <ul id="podeSerDesafiado" class="list-clean"></ul>
      </section>
    </section>

    <section class="panel">
      <h2>Histórico de partidas</h2>
      <div class="table-wrap">
        <table class="table" id="historicoTable">
          <thead><tr><th>Data</th><th>Horário</th><th>Status</th><th>Resultado</th><th>Ação</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
