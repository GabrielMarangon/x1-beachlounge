<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X1 Beach Lounge | Identificação</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo_ranking_x1_oficial.png') }}">
  <link rel="shortcut icon" href="{{ url_for('static', filename='images/logo_ranking_x1_oficial.png') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body data-page="identificacao">
  <main class="container auth-container">
    <section class="panel auth-panel">
      <h1>Identificação de acesso</h1>
      <p class="hint">Atletas devem entrar com o nome do ranking e o telefone cadastrado. Visitantes podem apenas se identificar para navegação geral.</p>
      {% if erro %}<p class="msg msg-erro">{{ erro }}</p>{% endif %}
      <form method="post" action="/identificacao" class="form-grid">
        <input type="hidden" name="next_url" value="{{ next_url or '/' }}">
        <label>Nome
          <input type="text" name="nome" required placeholder="Nome do atleta ou visitante">
        </label>
        <label>Contato
          <input type="text" name="contato" placeholder="Telefone cadastrado do atleta ou contato do visitante">
        </label>
        <button type="submit">Entrar no sistema</button>
      </form>
    </section>
  </main>
</body>
</html>
