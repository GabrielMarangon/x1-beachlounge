<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X1 BTC | Identificação</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo_ranking_x1_oficial.png') }}">
  <link rel="shortcut icon" href="{{ url_for('static', filename='images/logo_ranking_x1_oficial.png') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body data-page="identificacao">
  <main class="container auth-container">
    <section class="panel auth-panel">
      <h1>Identificação de acesso</h1>
      <p class="hint">Antes de entrar no sistema, informe quem está acessando. Isso permite acompanhar quem testou o programa.</p>
      {% if erro %}<p class="msg msg-erro">{{ erro }}</p>{% endif %}
      <form method="post" action="/identificacao" class="form-grid">
        <input type="hidden" name="next_url" value="{{ next_url or '/' }}">
        <label>Nome
          <input type="text" name="nome" required placeholder="Seu nome">
        </label>
        <label>Contato
          <input type="text" name="contato" placeholder="WhatsApp ou e-mail">
        </label>
        <button type="submit">Entrar no sistema</button>
      </form>
    </section>
  </main>
</body>
</html>
