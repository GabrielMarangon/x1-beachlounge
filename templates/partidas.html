<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X1_BTC - Jogos Marcados</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body data-page="partidas">
  <header class="topbar">
    <div class="topbar-grid">
      <div class="topbar-logo left">
        <img class="brand-logo" src="{{ url_for('static', filename='images/logo_btc_oficial.png') }}" alt="Logo Brasil Tênis Clube">
      </div>
      <div class="topbar-title">
        <span class="topbar-club">Brasil Tênis Clube</span>
        <h1>Jogos Marcados</h1>
        <p>Agenda pública para atletas e visitantes</p>
      </div>
      <div class="topbar-logo right">
        <img class="brand-logo" src="{{ url_for('static', filename='images/logo_ranking_x1_oficial.png') }}" alt="Logo Ranking X1">
      </div>
    </div>
  </header>
  <nav class="nav-links">
    <a href="/">Início</a><a href="/ranking">Ranking</a><a href="/agenda">Agenda</a><a href="/resultado-atleta">Resultado do atleta</a><a href="/desafio">Desafios</a>
  </nav>

  <main class="container">
    <section class="panel filtros-grid">
      <label>Data <input type="date" id="filtroData"></label>
      <label>Categoria
        <select id="filtroCategoria">
          <option value="">Todas</option>
          {% for k,v in ranking_rotulos.items() %}
            <option value="{{ k }}">{{ v }}</option>
          {% endfor %}
        </select>
      </label>
      <label>Quadra
        <select id="filtroQuadra">
          <option value="">Todas</option>
          <option value="quadra_1">Quadra 1</option>
          <option value="quadra_2">Quadra 2</option>
          <option value="quadra_3">Quadra 3</option>
        </select>
      </label>
      <label>Atleta <input type="text" id="filtroAtleta" placeholder="Nome do atleta"></label>
      <button id="btnFiltrarPartidas">Filtrar jogos</button>
    </section>

    <section class="panel">
      <h2>Agenda esportiva</h2>
      <div class="table-wrap">
        <table class="table" id="partidasTable">
          <thead>
            <tr>
              <th>Data</th>
              <th>Horário</th>
              <th>Quadra</th>
              <th>Confronto</th>
              <th>Categoria</th>
              <th>Status</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
