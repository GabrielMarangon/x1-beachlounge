<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X1 BTC - Login da Secretaria</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body data-page="login-secretaria">
  <main class="container auth-container">
    <section class="panel auth-panel">
      <h1>Login da secretaria</h1>
      <p class="hint">Somente pessoas autorizadas podem acessar a área administrativa.</p>
      {% if erro %}<p class="msg msg-erro">{{ erro }}</p>{% endif %}
      {% if not configurada %}
        <p class="hint">Configure no servidor: <code>SECRETARIA_USERNAME</code> e <code>SECRETARIA_PASSWORD</code> ou <code>SECRETARIA_PASSWORD_HASH</code>.</p>
      {% endif %}
      <form method="post" action="/login-secretaria" class="form-grid">
        <input type="hidden" name="next_url" value="{{ next_url or '/secretaria' }}">
        <label>Usuário
          <input type="text" name="usuario" required placeholder="Usuário da secretaria">
        </label>
        <label>Senha
          <input type="password" name="senha" required placeholder="Senha">
        </label>
        <button type="submit">Entrar na secretaria</button>
      </form>
    </section>
  </main>
</body>
</html>
